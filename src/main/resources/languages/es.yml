general:
  unknown: "Desconocido"

commands:
  reload: "&aConfiguración y archivos de idioma recargados."
  toggle-on: "&aSeguimiento de daño activado."
  toggle-off: "&cSeguimiento de daño desactivado."
  no-permission: "&cNo tienes permiso para usar este comando."
  rate-limit: "&cEspera un poco antes de usar este comando otra vez."
  only-players: "&cSolo los jugadores pueden usar este comando."
  unknown-mob: "&c'{mobtype}' no es un boss rastreado en el config."
  manual-spawn-cooldown: "&cEspera antes de invocar manualmente este boss otra vez."
  spawn-success: "&aBoss invocado: &f{mobtype}"
  spawn-failed: "&cNo se pudo invocar el boss: &f{mobtype}"
  setspawn-success: "&aPunto de aparición definido para &f{mobtype}"
  deletespawn-success: "&aPunto de aparición eliminado para &f{mobtype}"
  deletespawn-failed: "&cNo se pudo eliminar el punto de aparición para &f{mobtype}"
  killall-success: "&aKillall completado. Coinciden: &f{matched}&a, eliminados: &f{killed}&a, fallidos: &f{failed}&a."
  killall-world-missing: "&cMundo no encontrado: &f{world}"
  usage:
    spawn: "&eUso: /twiboss spawn <mobtype>"
    setspawn: "&eUso: /twiboss setspawn <mobtype>"
    deletespawn: "&eUso: /twiboss deletespawn <mobtype>"
    killall: "&eUso: /twiboss killall [mobtype] [-w mundo]"
  help:
    - "&b---- Comandos de TwiBosses ----"
    - "&e/twiboss reload &7- Recarga config e idiomas"
    - "&e/twiboss toggle &7- Activa o desactiva el seguimiento de daño"
    - "&e/twiboss spawn <mobtype> &7- Invoca un boss en tu ubicación"
    - "&e/twiboss setspawn <mobtype> &7- Define el punto de aparición"
    - "&e/twiboss deletespawn <mobtype> &7- Elimina el punto de aparición"
    - "&e/twiboss killall [mobtype] [-w mundo] &7- Mata bosses rastreados"
    - "&e/twiboss help &7- Muestra este menú"

display:
  actionbar: "&6Daño: &f{damage} &7(&e{percentage}%&7)"
  top-list: "&7{position}. &f{player} &8- &e{damage} &7(&f{percentage}%&7)"
  spawn-title:
    title: "&c&l{mobname}"
    subtitle: "&7apareció en &f{location}"
  death-title:
    title: "&c&l{mobname}"
    subtitle: "&7fue derrotado por &f{killer}"
  top-damage:
    header: "&8&m--------------------&r"
    killer-format: "&7> &c{mobname} &7fue derrotado por &f{killer}"
    top-header: "&6&lMayor Daño:"
    player-format: "&7{position}. &f{player} &8- &e{damage} &7(&f{percentage}%&7)"
    footer: "&8&m--------------------&r"
  reward-broadcast:
    rewards-header: "&a&lRecompensas entregadas:"
    reward-format: "&7- &f{player} &7recibió recompensas por el puesto #{position}"
  respawn-hologram:
    lines:
      - "&c&l{mobname}"
      - "&7Reaparece en: &f{time}"
  death-message-default: "&7{mobname} fue derrotado."

mobs:
  EliteSkeleton:
    display-name: "&c&lElite Skeleton"
    announcement:
      - ""
      - "&c&lElite Skeleton &7apareció en &f{location}."
      - ""
    death-message:
      - "&8&m----------------------------------------"
      - "&7> &c{mobname} &7fue derrotado por &f{killer}"
      - "&8&m----------------------------------------"
  BossZombie:
    display-name: "&4&lBoss Zombie"
    announcement:
      - ""
      - "&4&lBoss Zombie &7apareció en &f{location}."
      - ""
    death-message:
      - "&8&m----------------------------------------"
      - "&7> &c{mobname} &7fue derrotado por &f{killer}"
      - "&8&m----------------------------------------"

damage:
  threshold:
    default: "&cDebes hacer al menos {damage} de daño para entrar en la clasificación."
    per-mob:
      EliteSkeleton:
        message: "&cDebes hacer al menos {damage} de daño a {mobname}."

rewards:
  participation-received: "&a¡Recibiste una recompensa de participación!"
  lasthit-broadcast: "&a¡{player} recibió la recompensa del último golpe!"

