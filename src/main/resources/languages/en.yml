general:
  unknown: "Unknown"

commands:
  reload: "&aConfiguration and language files reloaded."
  toggle-on: "&aDamage tracking enabled."
  toggle-off: "&cDamage tracking disabled."
  no-permission: "&cYou do not have permission to use this command."
  rate-limit: "&cPlease slow down before using this command again."
  only-players: "&cOnly players can use this command."
  unknown-mob: "&c'{mobtype}' is not a tracked boss in config."
  manual-spawn-cooldown: "&cPlease wait before manually spawning this boss again."
  spawn-success: "&aSpawned boss: &f{mobtype}"
  spawn-failed: "&cFailed to spawn boss: &f{mobtype}"
  setspawn-success: "&aSpawn location set for &f{mobtype}"
  deletespawn-success: "&aSpawn location deleted for &f{mobtype}"
  deletespawn-failed: "&cFailed to delete spawn location for &f{mobtype}"
  killall-success: "&aKillall completed. Matched: &f{matched}&a, killed: &f{killed}&a, failed: &f{failed}&a."
  killall-world-missing: "&cWorld not found: &f{world}"
  invalid-coordinates: "&cInvalid coordinates. Use numbers like: -c -120 64 250"
  invalid-command-location: "&cInvalid or unsafe location. The world must be loaded, inside the world border, and the chunk must already be loaded."
  usage:
    spawn: "&eUsage: /twiboss spawn <mobtype> [-w world -c x y z]"
    setspawn: "&eUsage: /twiboss setspawn <mobtype> [-w world -c x y z]"
    deletespawn: "&eUsage: /twiboss deletespawn <mobtype>"
    killall: "&eUsage: /twiboss killall [mobtype] [-w world]"
  help:
    - "&b---- TwiBosses Commands ----"
    - "&e/twiboss reload &7- Reload config and language files"
    - "&e/twiboss toggle &7- Toggle damage tracking"
    - "&e/twiboss spawn <mobtype> [-w world -c x y z] &7- Spawn a boss"
    - "&e/twiboss setspawn <mobtype> [-w world -c x y z] &7- Set a boss spawn location"
    - "&e/twiboss deletespawn <mobtype> &7- Delete a boss spawn location"
    - "&e/twiboss killall [mobtype] [-w world] &7- Kill tracked bosses"
    - "&e/twiboss help &7- Show this help menu"

display:
  actionbar: "&6Damage: &f{damage} &7(&e{percentage}%&7)"
  top-list: "&7{position}. &f{player} &8- &e{damage} &7(&f{percentage}%&7)"
  spawn-title:
    title: "&c&l{mobname}"
    subtitle: "&7appeared at &f{location}"
  death-title:
    title: "&c&l{mobname}"
    subtitle: "&7was defeated by &f{killer}"
  top-damage:
    header: "&8&m--------------------&r"
    killer-format: "&7> &c{mobname} &7was defeated by &f{killer}"
    top-header: "&6&lTop Damage Dealers:"
    player-format: "&7{position}. &f{player} &8- &e{damage} &7(&f{percentage}%&7)"
    footer: "&8&m--------------------&r"
  reward-broadcast:
    rewards-header: "&a&lRewards given:"
    reward-format: "&7- &f{player} &7received rewards for #{position}"
  respawn-hologram:
    lines:
      - "&c&l{mobname}"
      - "&7Respawning in: &f{time}"
  death-message-default: "&7{mobname} has been defeated."

mobs:
  EliteSkeleton:
    display-name: "&c&lElite Skeleton"
    announcement:
      - ""
      - "&c&lElite Skeleton &7has appeared at &f{location}."
      - ""
    death-message:
      - "&8&m----------------------------------------"
      - "&7> &c{mobname} &7was defeated by &f{killer}"
      - "&8&m----------------------------------------"
  BossZombie:
    display-name: "&4&lBoss Zombie"
    announcement:
      - ""
      - "&4&lBoss Zombie &7has appeared at &f{location}."
      - ""
    death-message:
      - "&8&m----------------------------------------"
      - "&7> &c{mobname} &7was defeated by &f{killer}"
      - "&8&m----------------------------------------"

damage:
  threshold:
    default: "&cYou need to deal at least {damage} damage to be counted in rankings."
    per-mob:
      EliteSkeleton:
        message: "&cYou need to deal at least {damage} damage to {mobname}."

rewards:
  participation-received: "&aYou received a participation reward!"
  lasthit-broadcast: "&a{player} received the lasthit reward!"

  permission-received: "&aYou received the {reward} permission bonus for {mobname}!"

placeholders:
  respawn-countdown: "&a{mobname} will respawn in {time}."
  mob-ready: "&aReady"
  not-available: "N/A"
  none: "None"
  yes: "Yes"
  no: "No"
  ready: "Ready"
  no-player: "No player"
  no-data: "No data"
  top-format: "&f{player} &8» &e{damage} &7(&f{percentage}%&7)"

boss-health:
  announcement: "&c&l{mobname} &fhas reached &c{percentage}% &fhealth."

webhooks:
  default:
    username: "TwiBosses"
    field-boss: "Boss"
    field-world: "World"
    field-location: "Location"
    field-killer: "Killer"
    spawn:
      content: ""
      embed-title: "Boss Spawned"
      embed-description: "**{mobname}** spawned at **{location}** in **{world}**."
      embed-footer: "TwiBosses - Boss Spawn"
    death:
      content: ""
      embed-title: "Boss Defeated"
      embed-description: "**{mobname}** was defeated by **{killer}**."
      embed-footer: "TwiBosses - Boss Death"

banner:
  enable:
    - "&a--------------------------------------------------------"
    - ""
    - "&aTwiBosses v{version}"
    - "&bAuthor: Siberanka"
    - ""
    - "&bTwiBosses has been successfully enabled."
    - ""
    - "&a--------------------------------------------------------"
  disable:
    - "&4--------------------------------------------------------"
    - ""
    - "&4TwiBosses v{version}"
    - "&bAuthor: Siberanka"
    - ""
    - "&bTwiBosses has been successfully disabled."
    - ""
    - "&4--------------------------------------------------------"

updates:
  check-failed: "Unable to check for updates: {error}"
  console:
    - "==========================================="
    - "There is a new update available for TwiBosses."
    - "Current version: {current}"
    - "Latest version: {latest}"
    - "Download: {url}"
    - "==========================================="
  player:
    - "&a==========================================="
    - "&aThere is a new update available for TwiBosses."
    - "&aCurrent version: &c{current}"
    - "&aLatest version: &e{latest}"
    - "&aDownload: &b{url}"
    - "&a==========================================="

