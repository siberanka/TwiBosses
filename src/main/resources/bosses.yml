# TwiBosses boss configuration
#
# Configure tracked MythicMobs, respawn timers, rewards, permission rewards, and per-boss schedules here.
# Bedrock visual behavior is configured globally in config.yml; per-boss vanilla entity and equipment items are configured here.

tracked-mobs:
  EliteSkeleton:
    # Optional TwiBosses display name used in Bedrock visuals, holograms, webhooks, broadcasts, and placeholders.
    # Leave empty to use the MythicMobs display name. If MythicMobs has no display name, the language file fallback is used.
    display-name: ""
    # Seconds before this boss is removed automatically if it is not killed.
    # -1 disables timeout removal. Timeout removal does not run death rewards.
    timeout-seconds: -1
    respawn:
      enabled: true
      time: 300
    spawn-time:
      enable: false
      time:
        - "08:00:00"
        - "12:00:00"
        - "18:30:00"
    bedrock-visual:
      # Bukkit EntityType name shown to Bedrock players when the global Bedrock visual system is enabled.
      vanilla-entity: SKELETON
      equipment:
        main-hand:
          provider: VANILLA
          item: BOW
          amount: 1
        off-hand: AIR
        helmet: AIR
        chestplate: AIR
        leggings: AIR
        boots: AIR
    rewards:
      top-1:
        min-damage: 0
        min-percentage: 0
        # Commands are executed by console after security validation.
        # Available placeholders: {player}, {rank}, {position}, {damage}, {percentage}, {mobtype}, {mobname}, {killer}
        commands:
          - "give {player} diamond 5"
          - "eco give {player} 5000"
        # provider: VANILLA, MYTHICMOBS, ITEMSADDER, NEXO, CRAFTENGINE
        # private: true sets the dropped item owner to the rewarded player.
        # amount-per-percent increases amount by floor(damage_percentage * value), capped by max-amount.
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 5
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 5
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
      top-2:
        commands:
          - "give {player} diamond 3"
          - "eco give {player} 3000"
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 3
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 3
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
      top-3:
        commands:
          - "give {player} diamond 2"
          - "eco give {player} 2000"
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 2
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 2
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
    participation-reward:
      enabled: true
      min-damage: 200
      min-percentage: 0
      commands:
        - "give {player} diamond 1"
      drops:
        - provider: VANILLA
          item: DIAMOND
          amount: 1
          chance: 1.0
          amount-per-percent: 0.0
          max-amount: 1
          private: true
          drop-at-boss: true
          pickup-delay-ticks: 20
          glow: false
    lasthit-reward:
      enabled: true
      min-damage: 200
      min-percentage: 0
      commands:
        - "give {player} diamond 1"
      drops:
        - provider: VANILLA
          item: DIAMOND
          amount: 1
          chance: 1.0
          amount-per-percent: 0.0
          max-amount: 1
          private: true
          drop-at-boss: true
          pickup-delay-ticks: 20
          glow: false
    permission-rewards:
      # Extra rewards for players with specific permission nodes.
      # These are checked once per boss death for every online player who dealt valid damage.
      # The same command safety checks, item providers, drop caps, private drops, and boss-location checks are used here.
      enabled: true
      # false lets a player receive every matching permission package.
      # true stops after the first matching package in the order below.
      stop-after-first-match: false
      rewards:
        vip:
          # Give this node with LuckPerms or another permission plugin.
          permission: twibosses.reward.vip
          min-damage: 200
          min-percentage: 0
          commands:
            - "eco give {player} 1000"
          drops:
            - provider: VANILLA
              item: GOLD_INGOT
              amount: 3
              chance: 1.0
              amount-per-percent: 0.0
              max-amount: 3
              private: true
              drop-at-boss: true
              pickup-delay-ticks: 20
              glow: false
        elite:
          permission: twibosses.reward.elite
          min-damage: 500
          min-percentage: 5
          commands:
            - "eco give {player} 2500"
          drops:
            # Custom item providers are also supported here: MYTHICMOBS, ITEMSADDER, NEXO, CRAFTENGINE.
            - provider: VANILLA
              item: EMERALD
              amount: 2
              chance: 1.0
              amount-per-percent: 0.0
              max-amount: 2
              private: true
              drop-at-boss: true
              pickup-delay-ticks: 20
              glow: true

