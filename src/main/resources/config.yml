settings:
  language: tr

security:
  commands:
    max-per-player-per-minute: 12
    max-console-per-minute: 30
  spawn:
    min-manual-spawn-interval-seconds: 5
    prevent-duplicate-alive-boss: true
  rewards:
    max-commands-per-rank: 8
    max-rank-rewards: 100
    max-drops-per-reward: 8
    max-total-drops-per-boss: 96
    max-drop-stack-amount: 64
    max-item-id-length: 96
    default-private-drops: true
    default-pickup-delay-ticks: 20
    max-command-length: 180
    allowed-command-prefixes:
      - "give"
      - "eco give"
      - "effect give"
      - "lp user"
    blocked-command-fragments:
      - ";"
      - "&&"
      - "||"
      - "$("
      - "`"
      - "op "
      - "deop "
      - "stop"
      - "restart"
      - "reload"
      - "pl"
      - "plugins"
  webhooks:
    max-content-length: 512
    max-field-length: 1024
    connect-timeout-ms: 4000
    read-timeout-ms: 4000
  bedrock-visuals:
    # Limits how quickly one Bedrock player can forward hits from a visual proxy to the real boss.
    max-proxy-hits-per-player-per-second: 8
    # Hard cap for one forwarded proxy hit. Keeps malformed damage events from becoming instant-kill payloads.
    max-forwarded-damage: 1000.0

metrics:
  enabled: true
  log-startup: true
  error-reporting: false

logging:
  error-log:
    # Writes plugin-related warnings/errors and stack traces to plugins/TwiBosses/error.log.
    enabled: true
    # true logs WARNING and SEVERE records; false logs only SEVERE records.
    include-warnings: true
    # Active error.log is rotated when it reaches this size.
    max-size-kb: 1024
    # Number of rotated files to keep: error.log.1, error.log.2, ...
    max-archives: 3

updates:
  enabled: false

bedrock-visuals:
  # Requires Floodgate on the backend server. Java players keep seeing the original MythicMob/model.
  enabled: false

display:
  actionbar:
    enabled: true
    update-interval: 20
  top-list:
    max-entries: 5
  top-damage:
    enable: true
  reward-broadcast:
    enable: true
  spawn-title:
    enabled: true
    fade-in: 10
    stay: 40
    fade-out: 10
    sound:
      enabled: true
      type: ENTITY_ENDER_DRAGON_GROWL
      volume: 1.0
      pitch: 1.0
  death-title:
    enabled: true
    fade-in: 10
    stay: 40
    fade-out: 10
    sound:
      enabled: true
      type: ENTITY_WITHER_DEATH
      volume: 1.0
      pitch: 1.0
  respawn-hologram:
    enabled: true

tracked-mobs:
  EliteSkeleton:
    bedrock-visual:
      # When enabled, Bedrock players see this boss as a vanilla mob instead of the Java model.
      enabled: false
      # The vanilla mob shown to Bedrock players. Use Bukkit EntityType names, for example ZOMBIE, SKELETON, WITHER_SKELETON.
      vanilla-entity: SKELETON
      # auto tries to detect ModelEngine/BetterModel model parts. Use true to force, false to never treat as modeled.
      modeled: auto
      # true keeps non-modeled MythicMobs unchanged for Bedrock players.
      only-when-modeled: true
      # Delay lets ModelEngine/BetterModel create model parts before detection.
      spawn-delay-ticks: 10
      # Lower values follow the real boss more closely. Keep at 2+ for busy servers.
      sync-interval-ticks: 2
      # Radius used to detect model provider parts around the boss.
      model-check-radius: 4.0
      # Hides detected nearby model parts from Bedrock players.
      hide-nearby-model-parts: true
      model-part-hide-radius: 4.0
      # Bedrock hits on the vanilla proxy are forwarded to the real MythicMob.
      forward-proxy-damage: true
      silent: true
      name-visible: true
      equipment:
        main-hand:
          provider: VANILLA
          item: BOW
          amount: 1
        off-hand: AIR
        helmet: AIR
        chestplate: AIR
        leggings: AIR
        boots: AIR
    respawn:
      enabled: true
      time: 300
    spawn-time:
      enable: false
      time:
        - "08:00:00"
        - "12:00:00"
        - "18:30:00"
    rewards:
      top-1:
        # commands are executed by console after security validation.
        # Available placeholders: {player}, {rank}, {position}, {damage}, {percentage}, {mobtype}, {mobname}, {killer}
        commands:
          - "give {player} diamond 5"
          - "eco give {player} 5000"
        # drops fall at the boss death location by default.
        # provider: VANILLA, MYTHICMOBS, ITEMSADDER, NEXO, CRAFTENGINE
        # private: true sets the dropped item owner to the rewarded player.
        # amount-per-percent increases amount by floor(damage_percentage * value), capped by max-amount.
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 5
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 5
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
      top-2:
        commands:
          - "give {player} diamond 3"
          - "eco give {player} 3000"
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 3
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 3
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
      top-3:
        commands:
          - "give {player} diamond 2"
          - "eco give {player} 2000"
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 2
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 2
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
    participation-reward:
      enabled: true
      min-damage: 200
      commands:
        - "give {player} diamond 1"
      drops:
        - provider: VANILLA
          item: DIAMOND
          amount: 1
          chance: 1.0
          amount-per-percent: 0.0
          max-amount: 1
          private: true
          drop-at-boss: true
          pickup-delay-ticks: 20
          glow: false
    lasthit-reward:
      enabled: true
      min-damage: 200
      commands:
        - "give {player} diamond 1"
      drops:
        - provider: VANILLA
          item: DIAMOND
          amount: 1
          chance: 1.0
          amount-per-percent: 0.0
          max-amount: 1
          private: true
          drop-at-boss: true
          pickup-delay-ticks: 20
          glow: false
  BossZombie:
    bedrock-visual:
      enabled: false
      vanilla-entity: ZOMBIE
      modeled: auto
      only-when-modeled: true
      spawn-delay-ticks: 10
      sync-interval-ticks: 2
      model-check-radius: 4.0
      hide-nearby-model-parts: true
      model-part-hide-radius: 4.0
      forward-proxy-damage: true
      silent: true
      name-visible: true
      equipment:
        main-hand:
          provider: VANILLA
          item: IRON_SWORD
          amount: 1
        off-hand: AIR
        helmet: AIR
        chestplate: AIR
        leggings: AIR
        boots: AIR
    respawn:
      enabled: true
      time: 300
    rewards:
      top-1:
        commands:
          - "give {player} netherite_ingot 2"
          - "eco give {player} 10000"
        drops:
          - provider: VANILLA
            item: NETHERITE_INGOT
            amount: 2
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 2
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
      top-2:
        commands:
          - "give {player} netherite_ingot 1"
          - "eco give {player} 5000"
        drops:
          - provider: VANILLA
            item: NETHERITE_INGOT
            amount: 1
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 1
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
      top-3:
        commands:
          - "give {player} diamond 5"
          - "eco give {player} 3000"
        drops:
          - provider: VANILLA
            item: DIAMOND
            amount: 5
            chance: 1.0
            amount-per-percent: 0.0
            max-amount: 5
            private: true
            drop-at-boss: true
            pickup-delay-ticks: 20
            glow: false
    participation-reward:
      enabled: true
      min-damage: 200
      commands:
        - "give {player} diamond 1"
      drops:
        - provider: VANILLA
          item: DIAMOND
          amount: 1
          chance: 1.0
          amount-per-percent: 0.0
          max-amount: 1
          private: true
          drop-at-boss: true
          pickup-delay-ticks: 20
          glow: false
    lasthit-reward:
      enabled: true
      min-damage: 200
      commands:
        - "give {player} diamond 1"
      drops:
        - provider: VANILLA
          item: DIAMOND
          amount: 1
          chance: 1.0
          amount-per-percent: 0.0
          max-amount: 1
          private: true
          drop-at-boss: true
          pickup-delay-ticks: 20
          glow: false

boss-spawn-conditions:
  enabled: true
  mobs:
    BossExample:
      required-kills:
        enabled: true
        vanilla-mobs:
          ZOMBIE: 10
          SKELETON: 5
        mythic-mobs:
          CustomMob1: 3
          CustomMob2: 2

damage-settings:
  threshold:
    enabled: true
    default:
      minimum-damage: 200.0
    per-mob:
      EliteSkeleton:
        minimum-damage: 200.0

placeholders:
  damage-format: "#.##"
  percentage-format: "#.#"

discord:
  webhook:
    enabled: true

webhooks:
  EliteSkeleton:
    spawn:
      enabled: false
      url: ""
      avatar-url: ""
      embed-thumbnail: ""
    death:
      enabled: false
      url: ""
      avatar-url: ""
      embed-thumbnail: ""

mob-settings:
  movement-restriction:
    enabled: true
    max-distance: 7
    check-interval: 2
    teleport-back: true

hologram:
  provider: NONE

boss-health:
  announcements:
    enabled: true
    thresholds:
      - 70
      - 50
      - 30
      - 20
      - 10
      - 5
