# TwiBosses main configuration
#
# Text shown to players is stored in languages/*.yml.
# Boss definitions and tracked MythicMobs are stored in bosses.yml.
# This file only controls global mechanics, integrations, limits, and display defaults.

settings:
  # Bundled languages: tr, en, az, es
  language: tr

runtime:
  updates:
    # Checks GitHub Releases for newer TwiBosses versions.
    enabled: false
  metrics:
    enabled: true
    log-startup: true
    error-reporting: false
  logging:
    error-log:
      # Writes plugin-related warnings/errors and stack traces to plugins/TwiBosses/error.log.
      # Disk access uses a dedicated bounded queue; overflow drops records instead of blocking a server tick.
      # Accepted records are drained for a bounded time during plugin shutdown.
      enabled: true
      # true logs WARNING and SEVERE records; false logs only SEVERE records.
      include-warnings: true
      # Active error.log is rotated when it reaches this size.
      max-size-kb: 1024
      # Number of rotated files to keep: error.log.1, error.log.2, ...
      max-archives: 3
    debug-log:
      # Writes detailed diagnostic steps to plugins/TwiBosses/debug.log.
      # Keep this disabled during normal gameplay and enable it only while investigating.
      # Entries are size-capped and written by one bounded background worker.
      enabled: false
      max-size-kb: 1024
      max-archives: 3

security:
  commands:
    max-per-player-per-minute: 12
    max-console-per-minute: 30
  spawn:
    min-manual-spawn-interval-seconds: 5
    prevent-duplicate-alive-boss: true
  damage:
    # Maximum concurrently tracked boss damage sessions. Stale sessions are pruned before this limit is enforced.
    max-active-boss-sessions: 256
    # Maximum unique players tracked per single boss. Extra players are ignored to prevent bot-driven memory growth.
    max-players-per-boss: 256
  rewards:
    max-commands-per-rank: 8
    max-rank-rewards: 100
    max-permission-rewards-per-mob: 16
    max-drops-per-reward: 8
    max-total-drops-per-boss: 96
    max-drop-stack-amount: 64
    max-item-id-length: 96
    default-private-drops: true
    default-pickup-delay-ticks: 20
    max-command-length: 180
    # If this list is empty, every command is allowed unless blocked below.
    allowed-command-prefixes:
      - "give"
      - "eco give"
      - "effect give"
      - "lp user"
    blocked-command-fragments:
      - ";"
      - "&&"
      - "||"
      - "$("
      - "`"
      - "op "
      - "deop "
      - "stop"
      - "restart"
      - "reload"
      - "pl"
      - "plugins"

integrations:
  holograms:
    # NONE, FANCY, or DECENT.
    provider: NONE
  bedrock-visuals:
    # Enabled by default. Requires Floodgate or a compatible Geyser API on the backend server.
    # Java players keep seeing the original MythicMob/model.
    enabled: true
    defaults:
      # Fallback Bukkit EntityType when a boss does not override vanilla-entity in bosses.yml.
      vanilla-entity: ZOMBIE
      # auto detects common ModelEngine/BetterModel parts. true forces proxies, false disables model detection.
      modeled: auto
      # true keeps non-modeled MythicMobs unchanged for Bedrock players.
      only-when-modeled: true
      # If auto detection cannot confirm a model after retries, create the vanilla proxy anyway.
      # Keep true when Bedrock visibility is more important than strictly preserving non-modeled MythicMobs.
      fallback-when-model-undetected: true
      # Delay registers a new boss after model providers have had time to create their parts.
      spawn-delay-ticks: 10
      # Lower values follow the real boss more closely. Keep at 2+ for busy servers.
      sync-interval-ticks: 2
      model-check-radius: 4.0
      hide-nearby-model-parts: true
      model-part-hide-radius: 4.0
      # Bedrock hits on the vanilla proxy are forwarded to the real MythicMob.
      forward-proxy-damage: true
      silent: true
      name-visible: true
      equipment:
        # Set false if Bedrock players should see vanilla mobs without held items or armor.
        enabled: true
    limits:
      # Limits how quickly one Bedrock player can forward hits from a visual proxy to the real boss.
      max-proxy-hits-per-player-per-second: 8
      # Hard cap for one forwarded proxy hit. Keeps malformed damage events from becoming instant-kill payloads.
      max-forwarded-damage: 1000.0
      # How often visibility is refreshed for nearby players so Bedrock players who enter the area later still see the proxy.
      visibility-refresh-interval-ticks: 20
      # Only players inside this radius from the boss are processed during each visibility refresh.
      visibility-refresh-radius: 128.0
      # Hard cap for players processed per proxy refresh to avoid spikes on crowded servers.
      max-viewers-per-refresh: 160
      # Proxy sync stops immediately when the last nearby Bedrock viewer leaves.
      # The idle proxy is removed after this grace period to avoid spawn/remove churn at the radius border.
      # Set 0 for immediate removal. Dormant bosses keep no proxy and run no high-frequency sync task.
      idle-deactivation-delay-ticks: 40
      # Retries help delayed model providers and run only while a Bedrock player is nearby.
      model-detection-retries: 8
      model-detection-retry-interval-ticks: 10
  webhooks:
    enabled: true
    limits:
      max-content-length: 512
      max-field-length: 1024
      connect-timeout-ms: 4000
      read-timeout-ms: 4000
    mobs:
      EliteSkeleton:
        spawn:
          enabled: false
          url: ""
          avatar-url: ""
          embed-thumbnail: ""
        death:
          enabled: false
          url: ""
          avatar-url: ""
          embed-thumbnail: ""

display:
  actionbar:
    enabled: true
    update-interval: 20
  top-list:
    max-entries: 5
  top-damage:
    enable: true
  reward-broadcast:
    enable: true
  spawn-title:
    enabled: true
    fade-in: 10
    stay: 40
    fade-out: 10
    sound:
      enabled: true
      type: ENTITY_ENDER_DRAGON_GROWL
      volume: 1.0
      pitch: 1.0
  death-title:
    enabled: true
    fade-in: 10
    stay: 40
    fade-out: 10
    sound:
      enabled: true
      type: ENTITY_WITHER_DEATH
      volume: 1.0
      pitch: 1.0
  respawn-hologram:
    enabled: true

boss-spawn-conditions:
  enabled: true
  mobs:
    BossExample:
      required-kills:
        enabled: true
        vanilla-mobs:
          ZOMBIE: 10
          SKELETON: 5
        mythic-mobs:
          CustomMob1: 3
          CustomMob2: 2

damage-settings:
  threshold:
    enabled: true
    default:
      minimum-damage: 200.0
    per-mob:
      EliteSkeleton:
        minimum-damage: 200.0

placeholders:
  damage-format: "#.##"
  percentage-format: "#.#"

mob-settings:
  movement-restriction:
    enabled: true
    max-distance: 7
    check-interval: 2
    teleport-back: true

boss-health:
  announcements:
    enabled: true
    thresholds:
      - 70
      - 50
      - 30
      - 20
      - 10
      - 5
