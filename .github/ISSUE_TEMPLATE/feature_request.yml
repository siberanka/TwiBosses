name: Feature request
description: Suggest a focused improvement for TwiBosses.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What server workflow or limitation would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want TwiBosses to provide.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any config-only workaround or plugin combination you tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or configuration snippets if useful. Remove private data first.
